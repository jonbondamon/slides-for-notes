<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#FAF7F0" />
		<title>Slides for Notes</title>
		<meta
			name="description"
			content="Extend slide PDFs with a notes area for handwritten notes."
		/>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>

		<script>
			// Polyfill for older Safari / iPadOS: pdf.js v5 uses these recent
			// Map methods (Stage 4 TC39, only in Safari 18.5+).
			(function () {
				if (typeof Map !== 'undefined') {
					if (!Map.prototype.getOrInsertComputed) {
						Map.prototype.getOrInsertComputed = function (key, callback) {
							if (this.has(key)) return this.get(key);
							var value = callback(key);
							this.set(key, value);
							return value;
						};
					}
					if (!Map.prototype.getOrInsert) {
						Map.prototype.getOrInsert = function (key, defaultValue) {
							if (this.has(key)) return this.get(key);
							this.set(key, defaultValue);
							return defaultValue;
						};
					}
				}
				if (typeof WeakMap !== 'undefined') {
					if (!WeakMap.prototype.getOrInsertComputed) {
						WeakMap.prototype.getOrInsertComputed = function (key, callback) {
							if (this.has(key)) return this.get(key);
							var value = callback(key);
							this.set(key, value);
							return value;
						};
					}
					if (!WeakMap.prototype.getOrInsert) {
						WeakMap.prototype.getOrInsert = function (key, defaultValue) {
							if (this.has(key)) return this.get(key);
							this.set(key, defaultValue);
							return defaultValue;
						};
					}
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
